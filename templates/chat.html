<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Chat Room</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #e5ddd5;
            height: 100vh;
            overflow: hidden;
        }

        /* Chat Container */
        .chat-container {
            display: flex;
            height: 100vh;
            max-width: 1400px;
            margin: 0 auto;
            background: #fff;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        /* Sidebar - Contact List */
        .sidebar {
            width: 320px;
            background: #fff;
            border-right: 1px solid #e9ecef;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            background: #075e54;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .sidebar-header h2 {
            font-size: 18px;
            margin-bottom: 10px;
        }

        .status-badge {
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 12px;
            background: #25d366;
            display: inline-block;
        }

        .search-box {
            padding: 12px;
            background: #f6f6f6;
            border-bottom: 1px solid #e9ecef;
        }

        .search-box input {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 20px;
            background: #fff;
            outline: none;
            font-size: 14px;
        }

        .contacts-list {
            flex: 1;
            overflow-y: auto;
        }

        .contact-item {
            display: flex;
            align-items: center;
            padding: 15px;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 1px solid #f0f0f0;
        }

        .contact-item:hover {
            background: #f5f5f5;
        }

        .contact-item.active {
            background: #ebebeb;
        }

        .contact-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #25d366;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
            margin-right: 12px;
        }

        .contact-info {
            flex: 1;
        }

        .contact-name {
            font-weight: 600;
            margin-bottom: 4px;
            color: #111;
        }

        .contact-number {
            font-size: 12px;
            color: #666;
        }

        /* Main Chat Area */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #efeae2;
        }

        .chat-header {
            background: #075e54;
            color: white;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-header-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #25d366;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .chat-header-info h3 {
            font-size: 16px;
            margin-bottom: 4px;
        }

        .chat-header-info p {
            font-size: 12px;
            opacity: 0.9;
        }

        /* Messages Area */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background-image: url('https://web.whatsapp.com/img/bg-chat-tile-light_686f0d8f23b7a0c6c3daa16c9b144b81.jpg');
            background-repeat: repeat;
        }

        .message {
            display: flex;
            margin-bottom: 8px;
        }

        .message.received {
            justify-content: flex-start;
        }

        .message.sent {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 65%;
            padding: 8px 12px;
            border-radius: 8px;
            position: relative;
            word-wrap: break-word;
        }

        .message.received .message-bubble {
            background: white;
            color: #111;
        }

        .message.sent .message-bubble {
            background: #dcf8c5;
            color: #111;
        }

        .message-time {
            font-size: 10px;
            color: #666;
            margin-top: 4px;
            text-align: right;
        }

        /* Input Area */
        .input-area {
            background: #f0f0f0;
            padding: 15px 20px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .input-area input {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 24px;
            outline: none;
            font-size: 14px;
        }

        .input-area button {
            background: #075e54;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 24px;
            cursor: pointer;
            font-weight: 600;
        }

        .input-area button:hover {
            background: #054a42;
        }

        .emoji-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
        }

        /* Empty State */
        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #666;
        }

        .empty-state svg {
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>WhatsApp Bot</h2>
                <div class="status-badge" id="connection-status">Connecting...</div>
            </div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search contacts...">
            </div>
            <div class="contacts-list" id="contactsList">
                <div class="loading">Loading contacts...</div>
            </div>
        </div>

        <!-- Chat Area -->
        <div class="chat-area">
            <div class="chat-header" id="chatHeader" style="display: none;">
                <div class="chat-header-avatar" id="chatAvatar">?</div>
                <div class="chat-header-info">
                    <h3 id="chatName">Select a contact</h3>
                    <p id="chatNumber">Start chatting</p>
                </div>
            </div>
            <div class="messages-area" id="messagesArea">
                <div class="empty-state">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
                    </svg>
                    <p>Select a contact to start chatting</p>
                </div>
            </div>
            <div class="input-area" id="inputArea" style="display: none;">
                <button class="emoji-btn" onclick="showEmojiPicker()">😊</button>
                <input type="text" id="messageInput" placeholder="Type a message..." onkeypress="handleKeyPress(event)">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        let currentContact = null;
        let contacts = [];
        let refreshInterval = null;

        // Check connection status
        function checkStatus() {
            fetch('/api/status-full')
                .then(res => res.json())
                .then(data => {
                    const statusEl = document.getElementById('connection-status');
                    if (data.is_logged_in && data.is_connected) {
                        statusEl.textContent = 'Connected';
                        statusEl.style.background = '#25d366';
                        loadContacts();
                    } else {
                        statusEl.textContent = 'Disconnected - Scan QR';
                        statusEl.style.background = '#dc2626';
                    }
                })
                .catch(err => console.error(err));
        }

        // Load contacts
        function loadContacts() {
            fetch('/api/chats')
                .then(res => res.json())
                .then(data => {
                    contacts = data;
                    renderContacts();
                })
                .catch(err => console.error(err));
        }

        // Render contacts list
        function renderContacts() {
            const container = document.getElementById('contactsList');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            const filtered = contacts.filter(c => 
                c.name?.toLowerCase().includes(searchTerm) || 
                c.number.includes(searchTerm)
            );
            
            if (filtered.length === 0) {
                container.innerHTML = '<div class="loading">No contacts found</div>';
                return;
            }
            
            container.innerHTML = filtered.map(contact => `
                <div class="contact-item" onclick="selectContact('${contact.jid}', '${escapeHtml(contact.name)}', '${contact.number}')">
                    <div class="contact-avatar">${getInitials(contact.name || contact.number)}</div>
                    <div class="contact-info">
                        <div class="contact-name">${escapeHtml(contact.name || contact.number)}</div>
                        <div class="contact-number">${contact.number}</div>
                    </div>
                </div>
            `).join('');
        }

        // Get initials for avatar
        function getInitials(name) {
            if (!name) return '?';
            const words = name.split(' ');
            if (words.length === 1) return name.charAt(0).toUpperCase();
            return (words[0].charAt(0) + words[1].charAt(0)).toUpperCase();
        }

        // Select a contact
        function selectContact(jid, name, number) {
            currentContact = { jid, name, number };
            
            // Update header
            document.getElementById('chatHeader').style.display = 'flex';
            document.getElementById('inputArea').style.display = 'flex';
            document.getElementById('chatAvatar').textContent = getInitials(name);
            document.getElementById('chatName').textContent = name;
            document.getElementById('chatNumber').textContent = number;
            
            // Load messages
            loadMessages();
        }

        // Load messages for selected contact
        function loadMessages() {
            if (!currentContact) return;
            
            // Show loading
            document.getElementById('messagesArea').innerHTML = '<div class="loading">Loading messages...</div>';
            
            fetch(`/api/messages/${encodeURIComponent(currentContact.jid)}`)
                .then(res => res.json())
                .then(messages => {
                    renderMessages(messages);
                })
                .catch(err => {
                    console.error(err);
                    document.getElementById('messagesArea').innerHTML = '<div class="empty-state"><p>No messages yet</p></div>';
                });
        }

        // Render messages
        function renderMessages(messages) {
            const container = document.getElementById('messagesArea');
            
            if (!messages || messages.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>No messages yet. Start a conversation!</p></div>';
                return;
            }
            
            container.innerHTML = messages.map(msg => `
                <div class="message ${msg.is_from_me ? 'sent' : 'received'}">
                    <div class="message-bubble">
                        ${escapeHtml(msg.text || msg.content || '')}
                        <div class="message-time">${formatTime(msg.timestamp)}</div>
                    </div>
                </div>
            `).join('');
            
            // Scroll to bottom
            container.scrollTop = container.scrollHeight;
        }

        // Send message
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            
            if (!text || !currentContact) return;
            
            // Add message to UI immediately (optimistic update)
            addMessageToUI(text, true);
            input.value = '';
            
            // Send to server
            fetch('/api/send-message', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    to: currentContact.number,
                    text: text
                })
            })
            .then(res => res.json())
            .then(data => {
                if (data.status !== 'sent') {
                    alert('Failed to send message');
                }
            })
            .catch(err => {
                console.error(err);
                alert('Error sending message');
            });
        }

        // Add message to UI
        function addMessageToUI(text, isSent) {
            const container = document.getElementById('messagesArea');
            
            // Remove empty state if present
            if (container.querySelector('.empty-state')) {
                container.innerHTML = '';
            }
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isSent ? 'sent' : 'received'}`;
            messageDiv.innerHTML = `
                <div class="message-bubble">
                    ${escapeHtml(text)}
                    <div class="message-time">Just now</div>
                </div>
            `;
            container.appendChild(messageDiv);
            container.scrollTop = container.scrollHeight;
        }

        // Handle enter key
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        // Show emoji picker (simple version)
        function showEmojiPicker() {
            const emojis = ['😊', '😂', '❤️', '👍', '🎉', '🔥', '✨', '💯'];
            const picker = document.createElement('div');
            picker.style.position = 'absolute';
            picker.style.bottom = '70px';
            picker.style.left = '20px';
            picker.style.background = 'white';
            picker.style.border = '1px solid #ddd';
            picker.style.borderRadius = '8px';
            picker.style.padding = '10px';
            picker.style.display = 'grid';
            picker.style.gridTemplateColumns = 'repeat(4, 40px)';
            picker.style.gap = '5px';
            picker.style.zIndex = '1000';
            
            emojis.forEach(emoji => {
                const btn = document.createElement('button');
                btn.textContent = emoji;
                btn.style.fontSize = '24px';
                btn.style.border = 'none';
                btn.style.background = 'none';
                btn.style.cursor = 'pointer';
                btn.onclick = () => {
                    document.getElementById('messageInput').value += emoji;
                    picker.remove();
                };
                picker.appendChild(btn);
            });
            
            document.body.appendChild(picker);
            
            // Remove picker when clicking outside
            setTimeout(() => {
                document.addEventListener('click', function removePicker(e) {
                    if (!picker.contains(e.target)) {
                        picker.remove();
                        document.removeEventListener('click', removePicker);
                    }
                });
            }, 0);
        }

        // Helper functions
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatTime(timestamp) {
            if (!timestamp) return '';
            const date = new Date(timestamp);
            return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        // Search functionality
        document.getElementById('searchInput').addEventListener('input', () => {
            renderContacts();
        });

        // Auto refresh every 5 seconds
        setInterval(() => {
            checkStatus();
            if (currentContact) {
                loadMessages();
            }
        }, 5000);

        // Initial load
        checkStatus();
    </script>
</body>
</html>
